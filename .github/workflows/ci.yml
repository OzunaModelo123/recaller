# CI for Recaller — lint, unit tests, build, Playwright smoke (from docs/github-actions-ci.yml)
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key-for-ci
      SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-for-ci
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
      CI: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Unit tests (Vitest)
        run: npm run test

      - name: Build Next.js
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: E2E & API smoke (Playwright)
        run: npm run test:e2e
